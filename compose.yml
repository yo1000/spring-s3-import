x-api-environment: &api-environment
  SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/postgres
  SPRING_DATASOURCE_USERNAME: postgres
  SPRING_DATASOURCE_PASSWORD: postgres
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  APP_S3_ENDPOINT: http://localstack:4566
  APP_S3_PATHSTYLE: true
  APP_S3_BUCKETNAME: localstack
  APP_CSV_FILEPATH: users.csv.gz
  # Local only (Every 2-minutes)
  APP_TIME_UPDATECRON: "0 */2 * * * *"
  # Local only (60-seconds)
  APP_TIME_WAITUNITTIMEMILLIS: 60000
  # Local only (2-minutes)
  APP_TIME_MINUPDATEINTERVALMILLIS: 120000
  # Local only (5-minutes)
  APP_TIME_NODEKEEPALIVEMILLIS: 300000
  APP_NODE_GENERATIONS: 5
  # Only local
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: health,info,metrics

services:
  user-api-1:
    build:
      context: .
      args:
        JAR: ./target/*.jar
    environment:
      <<: *api-environment
    ports:
      - "8080:8080"
      - "8090:8090"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  user-api-2:
    build:
      context: .
      args:
        JAR: ./target/*.jar
    environment:
      <<: *api-environment
    ports:
      - "8081:8080"
      - "8091:8090"
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  httpd:
    image: httpd:2.4
    volumes:
      - ./httpd/httpd.conf:/usr/local/apache2/conf/httpd.conf
    ports:
      - "80:80"
    environment:
      TARGET_HOST1: user-api-1:8080
      TARGET_HOST2: user-api-2:8080

  postgres:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    command: >
      postgres -c max_wal_size=4GB -c checkpoint_timeout=10min -c checkpoint_completion_target=0.9
    ports:
      - "5432:5432"
    healthcheck:
      test: pg_isready -h 127.0.0.1 -U postgres -d postgres
      interval: 5s

  dbgate:
    image: dbgate/dbgate
    environment:
      CONNECTIONS: conn1
      LABEL_conn1: postgres
      SERVER_conn1: postgres
      USER_conn1: postgres
      PASSWORD_conn1: postgres
      PORT_conn1: 5432
      ENGINE_conn1: postgres@dbgate-plugin-postgres
    # Local only (Drop logs)
    command: >
      sh -c "exec /home/dbgate-docker/entrypoint.sh > /dev/null 2>&1"
    ports:
      - "5480:3000"
    depends_on:
      postgres:
        condition: service_healthy

  localstack:
    image: localstack/localstack:4.12
    environment:
      SERVICES: s3
      BUCKET_NAME: localstack
      SRC_FILE_PATH: /tmp/users.csv.gz
      DEST_OBJECT_PATH: users.csv.gz
    volumes:
      - "./localstack/dummy_users_1M_items.csv.gz:/tmp/users.csv.gz"
      - "./localstack/setup.sh:/etc/localstack/init/ready.d/setup.sh"
